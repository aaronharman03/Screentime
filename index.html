<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Controller</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #00ffcc; padding: 40px; width: 420px; text-align: center; }
        .instruction { font-size: 4rem; font-weight: bold; margin: 30px 0; color: #ff3b30; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        button { background: #00ffcc; color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .hidden { display: none; }
        input { background: #111; color: #00ffcc; border: 1px solid #333; padding: 15px; width: 90%; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-gate" class="card">
        <h1>VAULT_SYNC</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="pw" placeholder="LONG_PASSWORD">
        <button onclick="handleAuth()">INITIALIZE</button>
    </div>

    <div id="app-container" class="card hidden">
        <div id="display-view" class="hidden">
            <p>ACTIVE_PIN</p>
            <h1 id="stored-pin-val" style="font-size: 5rem; letter-spacing: 15px;">----</h1>
            <button onclick="startScramble()">NEW_LOCK</button>
        </div>

        <div id="scramble-view" class="hidden">
            <div id="phase-label" style="color:#00ffcc">PHASE 1: ENTRY</div>
            <div class="instruction" id="cmd-text">READY</div>
            <button onclick="nextStep()">NEXT_COMMAND</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEkrxbgNeezTdRjQSz_tcChEQMpsTa8aY",
            authDomain: "lockbox-a98b0.firebaseapp.com",
            projectId: "lockbox-a98b0",
            storageBucket: "lockbox-a98b0.firebasestorage.app",
            messagingSenderId: "484816205664",
            appId: "1:484816205664:web:3f82f72c907c23714cd005"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let secretPin = "";
        let masterPath = [];
        let index = 0;
        let p1Len = 0;

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                checkVault();
            }
        });

        async function checkVault() {
            const doc = await db.collection("users").doc(auth.currentUser.uid).get();
            if(doc.exists && doc.data().pin) {
                showDisplay(doc.data().pin);
            } else {
                startScramble();
            }
        }

        function generatePath(targetStr) {
            let target = targetStr.split('');
            let shadow = [];
            let path = [];
            while (shadow.join('') !== target.join('')) {
                // THE 4TH DIGIT FIX: 
                // If 3 digits are in, the next move MUST be the 4th real digit.
                if (shadow.length === 3) {
                    let d = target[3];
                    path.push("ENTER " + d); shadow.push(d);
                } else if (shadow.length === 0) {
                    let d = (Math.random() > 0.5) ? target[0] : Math.floor(Math.random()*10).toString();
                    path.push("ENTER " + d); shadow.push(d);
                } else {
                    let r = Math.random();
                    if (r < 0.4) { let d = target[shadow.length]; path.push("ENTER " + d); shadow.push(d); }
                    else if (r < 0.7) { let d = Math.floor(Math.random()*10).toString(); path.push("ENTER " + d); shadow.push(d); }
                    else { path.push("DELETE"); shadow.pop(); }
                }
            }
            return path;
        }

        function startScramble() {
            document.getElementById('display-view').classList.add('hidden');
            document.getElementById('scramble-view').classList.remove('hidden');
            secretPin = Math.floor(1000 + Math.random() * 9000).toString();
            let p1 = generatePath(secretPin);
            let p2 = generatePath(secretPin);
            p1Len = p1.length;
            masterPath = [...p1, ...p2];
            index = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('phase-label').innerText = index >= p1Len ? "PHASE 2: CONFIRM" : "PHASE 1: ENTRY";
            document.getElementById('cmd-text').innerText = masterPath[index];
        }

        async function nextStep() {
            index++;
            if (index < masterPath.length) {
                updateUI();
            } else {
                await db.collection("users").doc(auth.currentUser.uid).set({ pin: secretPin });
                alert("SUCCESS: LOCKED.");
                logout();
            }
        }

        function showDisplay(pin) {
            document.getElementById('scramble-view').classList.add('hidden');
            document.getElementById('display-view').classList.remove('hidden');
            document.getElementById('stored-pin-val').innerText = pin;
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
