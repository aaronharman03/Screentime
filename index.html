<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Vault Controller</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { border: 1px solid #00ffcc; padding: 40px; width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        .instruction { font-size: 3.5rem; font-weight: bold; margin: 40px 0; color: #ff3b30; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .step-info { color: #444; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        input { background: #111; color: #00ffcc; border: 1px solid #333; padding: 12px; width: 90%; margin: 10px 0; font-size: 1rem; text-align: center; }
        .hidden { display: none; }
        .vault-pin { font-size: 5rem; letter-spacing: 15px; margin: 30px 0; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="auth-gate" class="card">
        <h1>VAULT_SYNC</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="pw" placeholder="LONG_PASSWORD">
        <button onclick="handleAuth()">INITIALIZE</button>
    </div>

    <div id="app-container" class="card hidden">
        
        <div id="display-view" class="hidden">
            <p>STORED_PHONE_PIN</p>
            <div class="vault-pin" id="stored-pin-val">----</div>
            <button onclick="startNewScramble()" style="background:transparent; color:#00ffcc; border:1px solid #00ffcc; margin-bottom:10px;">RESET_PIN</button>
            <button onclick="logout()">LOGOUT</button>
        </div>

        <div id="scramble-view" class="hidden">
            <div class="step-info" id="step-counter">STEP 0 / 40</div>
            <div class="instruction" id="cmd-text">READY?</div>
            <button onclick="nextStep()">NEXT_STEP</button>
            <p style="font-size: 0.7rem; color: #333; margin-top: 15px;">Follow on your phone exactly.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let targetPin = "";
        let steps = [];
        let currentIdx = 0;

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                checkVault();
            }
        });

        async function checkVault() {
            const doc = await db.collection("users").doc(auth.currentUser.uid).get();
            if(doc.exists && doc.data().pin) {
                showDisplay(doc.data().pin);
            } else {
                startNewScramble();
            }
        }

        function startNewScramble() {
            document.getElementById('display-view').classList.add('hidden');
            document.getElementById('scramble-view').classList.remove('hidden');
            
            // Generate secret 4-digit PIN
            targetPin = Math.floor(1000 + Math.random() * 9000).toString();
            let targetArr = targetPin.split('');
            let shadow = [];
            steps = [];

            // Shadow Logic: Generate sequence until phone state = target
            while (shadow.join('') !== targetArr.join('') || steps.length < 40) {
                let move = Math.random();

                // If phone is full but wrong, must delete
                if (shadow.length === 4 && shadow.join('') !== targetArr.join('')) {
                    steps.push("DELETE"); shadow.pop();
                } 
                // If phone is empty, must enter (Real or Fake)
                else if (shadow.length === 0) {
                    let digit = (Math.random() > 0.5) ? targetArr[0] : Math.floor(Math.random()*10).toString();
                    steps.push("ENTER " + digit); shadow.push(digit);
                }
                // Randomly Add Real, Add Fake, or Delete
                else {
                    if (move < 0.4 && shadow.length < 4) { // Real
                        let d = targetArr[shadow.length];
                        steps.push("ENTER " + d); shadow.push(d);
                    } else if (move < 0.7 && shadow.length < 4) { // Fake
                        let d = Math.floor(Math.random()*10).toString();
                        steps.push("ENTER " + d); shadow.push(d);
                    } else { // Delete
                        steps.push("DELETE"); shadow.pop();
                    }
                }
            }
            currentIdx = 0;
            renderStep();
        }

        function renderStep() {
            document.getElementById('step-counter').innerText = `STEP ${currentIdx + 1} OF ${steps.length}`;
            document.getElementById('cmd-text').innerText = steps[currentIdx];
        }

        async function nextStep() {
            currentIdx++;
            if (currentIdx < steps.length) {
                renderStep();
            } else {
                await db.collection("users").doc(auth.currentUser.uid).set({ pin: targetPin });
                alert("Vault Synchronized. Session Terminated.");
                logout();
            }
        }

        function showDisplay(pin) {
            document.getElementById('scramble-view').classList.add('hidden');
            document.getElementById('display-view').classList.remove('hidden');
            document.getElementById('stored-pin-val').innerText = pin;
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
