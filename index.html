<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Vault Controller</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { border: 2px solid #00ffcc; padding: 40px; width: 420px; text-align: center; box-shadow: 0 0 25px rgba(0,255,204,0.2); }
        .instruction { font-size: 4rem; font-weight: bold; margin: 30px 0; color: #ff3b30; min-height: 120px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .status-text { color: #444; font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .phase-name { color: #00ffcc; font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
        button { background: #00ffcc; color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        button:active { background: #008866; }
        .hidden { display: none; }
        input { background: #111; color: #00ffcc; border: 1px solid #333; padding: 15px; width: 90%; margin: 10px 0; text-align: center; border-radius: 5px; }
        .vault-pin { font-size: 5rem; letter-spacing: 15px; margin: 30px 0; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <div id="auth-gate" class="card">
        <h1>VAULT_SYNC</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="pw" placeholder="LONG_PASSWORD">
        <button onclick="handleAuth()">INITIALIZE</button>
    </div>

    <div id="app-container" class="card hidden">
        
        <div id="display-view" class="hidden">
            <p>ACTIVE_PHONE_PIN</p>
            <div class="vault-pin" id="stored-pin-val">----</div>
            <button onclick="startScramble()" style="background:transparent; color:#00ffcc; border:1px solid #00ffcc; margin-bottom:10px;">RESET_LOCK</button>
            <button onclick="logout()" style="background:transparent; color:#444; border:none; font-size: 0.8rem;">LOGOUT</button>
        </div>

        <div id="scramble-view" class="hidden">
            <div id="phase-label" class="phase-name">PHASE 1: ENTRY</div>
            <div class="status-text" id="step-counter">STEP 1 / 0</div>
            <div class="instruction" id="cmd-text">READY</div>
            <button id="next-btn" onclick="nextStep()">NEXT_COMMAND</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEkrxbgNeezTdRjQSz_tcChEQMpsTa8aY",
            authDomain: "lockbox-a98b0.firebaseapp.com",
            projectId: "lockbox-a98b0",
            storageBucket: "lockbox-a98b0.firebasestorage.app",
            messagingSenderId: "484816205664",
            appId: "1:484816205664:web:3f82f72c907c23714cd005",
            measurementId: "G-7NCHBESZD8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let secretPin = "";
        let masterPath = [];
        let index = 0;
        let p1Len = 0;

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                checkVault();
            }
        });

        async function checkVault() {
            const doc = await db.collection("users").doc(auth.currentUser.uid).get();
            if(doc.exists && doc.data().pin) {
                showDisplay(doc.data().pin);
            } else {
                startScramble();
            }
        }

        // CRITICAL LOGIC: Respects the phone's auto-submit on 4th digit
        function generateStrictPath(targetStr) {
            let target = targetStr.split('');
            let shadow = [];
            let path = [];
            
            while (shadow.join('') !== target.join('')) {
                let r = Math.random();
                
                // If 3 digits are in, the 4th MUST be the final real digit.
                // No noise allowed at index 4 because the phone auto-submits.
                if (shadow.length === 3) {
                    let d = target[3];
                    path.push("ENTER " + d); shadow.push(d);
                } 
                // If phone is empty, must enter a digit (Real or Noise)
                else if (shadow.length === 0) {
                    let d = (r > 0.5) ? target[0] : Math.floor(Math.random()*10).toString();
                    path.push("ENTER " + d); shadow.push(d);
                }
                // Scramble logic for positions 1, 2, and 3
                else {
                    if (r < 0.4) { // Add Real
                        let d = target[shadow.length];
                        path.push("ENTER " + d); shadow.push(d);
                    } else if (r < 0.7) { // Add Noise
                        let d = Math.floor(Math.random()*10).toString();
                        path.push("ENTER " + d); shadow.push(d);
                    } else { // Delete
                        path.push("DELETE"); shadow.pop();
                    }
                }
            }
            return path;
        }

        function startScramble() {
            document.getElementById('display-view').classList.add('hidden');
            document.getElementById('scramble-view').classList.remove('hidden');
            
            secretPin = Math.floor(1000 + Math.random() * 9000).toString();
            
            let p1 = generateStrictPath(secretPin);
            let p2 = generateStrictPath(secretPin);
            
            p1Len = p1.length;
            masterPath = [...p1, ...p2];
            index = 0;
            updateUI();
        }

        function updateUI() {
            const isP2 = index >= p1Len;
            document.getElementById('phase-label').innerText = isP2 ? "PHASE 2: CONFIRMATION" : "PHASE 1: INITIAL ENTRY";
            document.getElementById('step-counter').innerText = `STEP ${index + 1} OF ${masterPath.length}`;
            document.getElementById('cmd-text').innerText = masterPath[index];
        }

        async function nextStep() {
            index++;
            if (index < masterPath.length) {
                updateUI();
            } else {
                await db.collection("users").doc(auth.currentUser.uid).set({ pin: secretPin });
                alert("SUCCESS: VAULT SEALED.");
                logout();
            }
        }

        function showDisplay(pin) {
            document.getElementById('scramble-view').classList.add('hidden');
            document.getElementById('display-view').classList.remove('hidden');
            document.getElementById('stored-pin-val').innerText = pin;
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
