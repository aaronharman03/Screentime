    :root {
        --green: #00ffcc;
        --red: #ff3b30;
        --bg: #000;
        --card-bg: #080808;
        --border: #1a1a1a;
        --dim: #333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(0,255,204,0.015) 2px,
            rgba(0,255,204,0.015) 4px
        );
        pointer-events: none;
        z-index: 999;
    }

    .card {
        border: 1px solid var(--green);
        background: var(--card-bg);
        padding: 36px 32px;
        width: 340px;
        text-align: center;
        position: relative;
        box-shadow: 0 0 40px rgba(0,255,204,0.08), inset 0 0 40px rgba(0,255,204,0.02);
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
        content: '';
        position: absolute;
        top: -1px; left: 10%;
        width: 80%; height: 1px;
        background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .logo {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 1.4rem;
        letter-spacing: 6px;
        color: var(--green);
        margin-bottom: 28px;
        text-shadow: 0 0 20px rgba(0,255,204,0.4);
    }

    .logo span { color: var(--dim); }

    input {
        background: #0a0a0a;
        color: var(--green);
        border: 1px solid var(--dim);
        padding: 12px 14px;
        width: 100%;
        margin-bottom: 10px;
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.85rem;
        letter-spacing: 1px;
        outline: none;
        transition: border-color 0.2s;
    }

    input:focus { border-color: var(--green); }
    input::placeholder { color: #2a2a2a; }

    .btn {
        background: transparent;
        color: var(--green);
        border: 1px solid var(--green);
        padding: 13px;
        width: 100%;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 3px;
        cursor: pointer;
        margin-top: 6px;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
        background: var(--green);
        color: #000;
        box-shadow: 0 0 20px rgba(0,255,204,0.3);
    }

    .btn:active { opacity: 0.7; }

    .btn-danger {
        border-color: var(--red);
        color: var(--red);
        margin-top: 12px;
    }

    .btn-danger:hover {
        background: var(--red);
        color: #000;
        box-shadow: 0 0 20px rgba(255,59,48,0.3);
    }

    .hidden { display: none !important; }

    /* PIN display */
    .pin-label {
        font-size: 0.65rem;
        letter-spacing: 4px;
        color: var(--dim);
        margin-bottom: 16px;
    }

    .pin-display {
        font-family: 'Orbitron', sans-serif;
        font-size: 3.8rem;
        font-weight: 900;
        letter-spacing: 14px;
        color: var(--green);
        text-shadow: 0 0 30px rgba(0,255,204,0.5);
        margin-bottom: 28px;
        padding: 20px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
    }

    /* Scramble view */
    .phase-tag {
        font-size: 0.6rem;
        letter-spacing: 3px;
        color: var(--dim);
        margin-bottom: 20px;
    }

    .phase-tag.active { color: var(--green); }

    .phases {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
    }

    .phase-dot {
        width: 24px;
        height: 3px;
        background: var(--dim);
        transition: background 0.3s;
    }

    .phase-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }

    .cmd-box {
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 0 28px;
        border: 1px solid var(--border);
        padding: 20px;
        position: relative;
    }

    .cmd-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--red);
        text-shadow: 0 0 20px rgba(255,59,48,0.4);
        letter-spacing: 2px;
        transition: opacity 0.15s;
    }

    .cmd-text.enter { color: var(--green); text-shadow: 0 0 20px rgba(0,255,204,0.4); }

    .progress-bar {
        height: 2px;
        background: var(--border);
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: var(--green);
        transition: width 0.3s ease;
        box-shadow: 0 0 8px var(--green);
    }

    .step-count {
        font-size: 0.6rem;
        color: var(--dim);
        letter-spacing: 2px;
        margin-bottom: 16px;
    }

    .error-msg {
        color: var(--red);
        font-size: 0.7rem;
        letter-spacing: 1px;
        margin-top: 10px;
        min-height: 18px;
    }
</style>

<!-- AUTH -->
<div id="auth-gate" class="card">
    <div class="logo">VAULT<span>_</span></div>
    <input type="email" id="email" placeholder="EMAIL" autocomplete="email">
    <input type="password" id="pw" placeholder="PASSWORD" autocomplete="current-password">
    <button class="btn" onclick="handleAuth()">UNLOCK</button>
    <div class="error-msg" id="auth-error"></div>
</div>

<!-- APP -->
<div id="app-container" class="card hidden">

    <!-- PIN display -->
    <div id="display-view" class="hidden">
        <div class="logo">VAULT<span>_</span></div>
        <div class="pin-label">ACTIVE PIN</div>
        <div class="pin-display" id="stored-pin-val">----</div>
        <button class="btn" onclick="startScramble()">GENERATE NEW PIN</button>
        <button class="btn btn-danger" onclick="doLogout()">SIGN OUT</button>
    </div>

    <!-- Scramble -->
    <div id="scramble-view" class="hidden">
        <div class="logo">VAULT<span>_</span></div>
        <div class="phases">
            <div class="phase-dot active" id="dot-1"></div>
            <div class="phase-dot" id="dot-2"></div>
        </div>
        <div class="phase-tag" id="phase-label">PHASE 1 — ENTRY</div>
        <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
        <div class="step-count" id="step-count">STEP 1</div>
        <div class="cmd-box">
            <div class="cmd-text" id="cmd-text">—</div>
        </div>
        <button class="btn" onclick="nextStep()">NEXT</button>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEkrxbgNeezTdRjQSz_tcChEQMpsTa8aY",
        authDomain: "lockbox-a98b0.firebaseapp.com",
        projectId: "lockbox-a98b0",
        storageBucket: "lockbox-a98b0.firebasestorage.app",
        messagingSenderId: "484816205664",
        appId: "1:484816205664:web:3f82f72c907c23714cd005"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let secretPin = "";
    let masterSteps = [];
    let index = 0;
    let p1Len = 0;

    // ── Auth ─────────────────────────────────────────────
    async function handleAuth() {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pw').value;
        const errEl = document.getElementById('auth-error');
        errEl.textContent = '';
        if (!e || !p) { errEl.textContent = 'ENTER EMAIL AND PASSWORD'; return; }
        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                // New user — create account
                try {
                    await auth.createUserWithEmailAndPassword(e, p);
                } catch (createErr) {
                    errEl.textContent = createErr.message.toUpperCase();
                }
            } else {
                errEl.textContent = 'INVALID CREDENTIALS';
            }
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            checkDb();
        } else {
            document.getElementById('auth-gate').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function checkDb() {
        const doc = await db.collection("users").doc(auth.currentUser.uid).get();
        if (doc.exists) { showPIN(doc.data().pin); }
        else { startScramble(); }
    }

    function doLogout() {
        auth.signOut();
    }

    // ── PIN display ───────────────────────────────────────
    function showPIN(pin) {
        document.getElementById('scramble-view').classList.add('hidden');
        document.getElementById('display-view').classList.remove('hidden');
        document.getElementById('stored-pin-val').textContent = pin;
    }

    // ── Scramble logic ────────────────────────────────────
    /*
     * iPhone screen time rules:
     *  - Entering the 4th digit auto-submits — no DELETE allowed after it.
     *  - So the 4th digit in any sequence MUST be the correct target digit.
     *  - Digits 1–3 can be correct or random, and can be followed by DELETE.
     *
     * generatePath builds a sequence of "ENTER x" / "DELETE" instructions
     * that always ends with the 4 correct digits in order, respecting the rule above.
     */
    function generatePath(target) {
        // Build a random sequence of ENTER/DELETE that ends on the correct PIN.
        // Rule: the 4th digit slot must always receive the correct digit (iPhone auto-submits).
        const path = [];
        let shadow = []; // digits currently "typed"
        const TARGET = 30 + Math.floor(Math.random() * 21); // 30-50 steps per phase

        while (true) {
            const pos = shadow.length;
            const remaining = TARGET - path.length;
            const stepsToFinish = 4 - pos; // minimum ENTERs needed to complete

            // Finished
            if (pos === 4 && shadow.join('') === target) break;

            // Must finish now — enter remaining correct digits straight
            if (remaining <= stepsToFinish) {
                if (pos === 4) { path.push("DELETE"); shadow.pop(); continue; }
                path.push("ENTER " + target[pos]);
                shadow.push(target[pos]);
                continue;
            }

            // At 4th slot: always correct digit, no fakes
            if (pos === 3) {
                path.push("ENTER " + target[3]);
                shadow.push(target[3]);
                continue;
            }

            // Fully random: enter random digit OR delete
            const canDelete = shadow.length > 0;
            const canEnter = pos < 3; // pos 3 handled above

            let action;
            if (!canDelete) {
                action = 'enter';
            } else {
                action = Math.random() < 0.6 ? 'enter' : 'delete';
            }

            if (action === 'enter') {
                // Fully random digit 0-9
                const digit = Math.floor(Math.random() * 10).toString();
                path.push("ENTER " + digit);
                shadow.push(digit);
            } else {
                path.push("DELETE");
                shadow.pop();
            }
        }

        return path;
    }

    function startScramble() {
        document.getElementById('display-view').classList.add('hidden');
        document.getElementById('scramble-view').classList.remove('hidden');

        secretPin = Math.floor(1000 + Math.random() * 9000).toString();
        const p1 = generatePath(secretPin);
        const p2 = generatePath(secretPin);
        p1Len = p1.length;
        masterSteps = [...p1, ...p2];
        index = 0;
        updateUI();
    }

    function updateUI() {
        const isPhase2 = index >= p1Len;
        const step = masterSteps[index];
        const isEnter = step && step.startsWith("ENTER");
        const total = masterSteps.length;
        const pct = Math.round((index / total) * 100);

        document.getElementById('dot-1').classList.toggle('active', !isPhase2);
        document.getElementById('dot-2').classList.toggle('active', isPhase2);
        document.getElementById('phase-label').textContent = isPhase2 ? 'PHASE 2 — CONFIRM' : 'PHASE 1 — ENTRY';
        document.getElementById('step-count').textContent = `STEP ${index + 1} OF ${total}`;
        document.getElementById('prog').style.width = pct + '%';

        const cmdEl = document.getElementById('cmd-text');
        cmdEl.style.opacity = 0;
        setTimeout(() => {
            cmdEl.textContent = step || '—';
            cmdEl.className = 'cmd-text' + (isEnter ? ' enter' : '');
            cmdEl.style.opacity = 1;
        }, 100);
    }

    async function nextStep() {
        index++;
        if (index < masterSteps.length) {
            updateUI();
        } else {
            await db.collection("users").doc(auth.currentUser.uid).set({ pin: secretPin });
            await auth.signOut();
            location.reload();
        }
    }
</script>
