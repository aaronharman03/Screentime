    :root {
        --green: #00ffcc;
        --red: #ff3b30;
        --bg: #000;
        --card-bg: #080808;
        --border: #1a1a1a;
        --dim: #222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,204,0.012) 2px, rgba(0,255,204,0.012) 4px);
        pointer-events: none;
        z-index: 999;
    }

    .card {
        border: 1px solid var(--green);
        background: var(--card-bg);
        padding: 32px 28px;
        width: 320px;
        text-align: center;
        position: relative;
        box-shadow: 0 0 40px rgba(0,255,204,0.07), inset 0 0 40px rgba(0,255,204,0.02);
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
        content: '';
        position: absolute;
        top: -1px; left: 10%;
        width: 80%; height: 1px;
        background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .logo {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 1.3rem;
        letter-spacing: 6px;
        color: var(--green);
        margin-bottom: 24px;
        text-shadow: 0 0 20px rgba(0,255,204,0.4);
    }

    .logo span { color: #333; }

    input {
        background: #0a0a0a;
        color: var(--green);
        border: 1px solid #2a2a2a;
        padding: 12px 14px;
        width: 100%;
        margin-bottom: 10px;
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.85rem;
        letter-spacing: 1px;
        outline: none;
        transition: border-color 0.2s;
    }

    input:focus { border-color: var(--green); }
    input::placeholder { color: #222; }

    .btn {
        background: transparent;
        color: var(--green);
        border: 1px solid var(--green);
        padding: 12px;
        width: 100%;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 3px;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .btn:hover { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
    .btn:active { opacity: 0.7; }

    .btn-danger { border-color: var(--red); color: var(--red); margin-top: 10px; }
    .btn-danger:hover { background: var(--red); color: #000; }

    .hidden { display: none !important; }

    .pin-label { font-size: 0.6rem; letter-spacing: 4px; color: #444; margin-bottom: 14px; }

    .pin-display {
        font-family: 'Orbitron', sans-serif;
        font-size: 3.4rem;
        font-weight: 900;
        letter-spacing: 12px;
        color: var(--green);
        text-shadow: 0 0 30px rgba(0,255,204,0.5);
        margin-bottom: 24px;
        padding: 18px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
    }

    .phases { display: flex; justify-content: center; gap: 8px; margin-bottom: 6px; }
    .phase-dot { width: 28px; height: 3px; background: var(--dim); transition: background 0.3s; }
    .phase-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .phase-label { font-size: 0.58rem; letter-spacing: 3px; color: #333; margin-bottom: 20px; }

    /* Keypad — no numbers, just position */
    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 10px;
    }

    .key {
        padding: 20px 0;
        border: 1px solid #1a1a1a;
        background: #0a0a0a;
        cursor: default;
        transition: all 0.12s;
    }

    .key.highlight {
        border-color: var(--green);
        background: rgba(0,255,204,0.09);
        box-shadow: 0 0 18px rgba(0,255,204,0.35);
        animation: pulse 0.7s ease-in-out infinite alternate;
    }

    @keyframes pulse {
        from { box-shadow: 0 0 8px rgba(0,255,204,0.15); }
        to   { box-shadow: 0 0 26px rgba(0,255,204,0.6); }
    }

    @keyframes pulse-red {
        from { box-shadow: 0 0 8px rgba(255,59,48,0.15); }
        to   { box-shadow: 0 0 26px rgba(255,59,48,0.6); }
    }

    .key-zero { grid-column: 2; }

    .key-del {
        width: 100%;
        padding: 14px 0;
        border: 1px solid #1a1a1a;
        background: #0a0a0a;
        color: #2a2a2a;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.65rem;
        letter-spacing: 3px;
        cursor: default;
        transition: all 0.12s;
        display: block;
        text-align: center;
        margin-bottom: 16px;
    }

    .key-del.highlight-del {
        border-color: var(--red);
        color: var(--red);
        background: rgba(255,59,48,0.07);
        animation: pulse-red 0.7s ease-in-out infinite alternate;
    }

    .error-msg { color: var(--red); font-size: 0.65rem; letter-spacing: 1px; margin-top: 8px; min-height: 16px; }
</style>

<div id="auth-gate" class="card">
    <div class="logo">VAULT<span>_</span></div>
    <input type="email" id="email" placeholder="EMAIL" autocomplete="email">
    <input type="password" id="pw" placeholder="PASSWORD" autocomplete="current-password">
    <button class="btn" onclick="handleAuth()">UNLOCK</button>
    <div class="error-msg" id="auth-error"></div>
</div>

<div id="app-container" class="card hidden">

    <div id="display-view" class="hidden">
        <div class="logo">VAULT<span>_</span></div>
        <div class="pin-label">SCREEN TIME PIN</div>
        <div class="pin-display" id="stored-pin-val">----</div>
        <button class="btn" onclick="startScramble()">GENERATE NEW PIN</button>
        <button class="btn btn-danger" onclick="doLogout()">SIGN OUT</button>
    </div>

    <div id="scramble-view" class="hidden">
        <div class="logo">VAULT<span>_</span></div>
        <div class="phases">
            <div class="phase-dot active" id="dot-1"></div>
            <div class="phase-dot" id="dot-2"></div>
        </div>
        <div class="phase-label" id="phase-label">PHASE 1 — ENTRY</div>

        <div class="keypad">
            <div class="key" id="k1"></div>
            <div class="key" id="k2"></div>
            <div class="key" id="k3"></div>
            <div class="key" id="k4"></div>
            <div class="key" id="k5"></div>
            <div class="key" id="k6"></div>
            <div class="key" id="k7"></div>
            <div class="key" id="k8"></div>
            <div class="key" id="k9"></div>
            <div class="key key-zero" id="k0"></div>
        </div>
        <div class="key-del" id="kdel">DELETE</div>

        <button class="btn" onclick="nextStep()">NEXT</button>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEkrxbgNeezTdRjQSz_tcChEQMpsTa8aY",
        authDomain: "lockbox-a98b0.firebaseapp.com",
        projectId: "lockbox-a98b0",
        storageBucket: "lockbox-a98b0.firebasestorage.app",
        messagingSenderId: "484816205664",
        appId: "1:484816205664:web:3f82f72c907c23714cd005"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let secretPin = "";
    let masterSteps = [];
    let index = 0;
    let p1Len = 0;

    async function handleAuth() {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pw').value;
        const errEl = document.getElementById('auth-error');
        errEl.textContent = '';
        if (!e || !p) { errEl.textContent = 'ENTER EMAIL AND PASSWORD'; return; }
        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                try { await auth.createUserWithEmailAndPassword(e, p); }
                catch (ce) { errEl.textContent = ce.message.toUpperCase(); }
            } else {
                errEl.textContent = 'INVALID CREDENTIALS';
            }
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            checkDb();
        } else {
            document.getElementById('auth-gate').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function checkDb() {
        const doc = await db.collection("users").doc(auth.currentUser.uid).get();
        if (doc.exists) { showPIN(doc.data().pin); }
        else { startScramble(); }
    }

    function doLogout() { auth.signOut(); }

    function showPIN(pin) {
        document.getElementById('scramble-view').classList.add('hidden');
        document.getElementById('display-view').classList.remove('hidden');
        document.getElementById('stored-pin-val').textContent = pin;
    }

    // Path generation
    // - Correct digits 1-3 woven into random noise
    // - 4th digit always correct and always last (iPhone auto-submits)
    // - Total steps kept between 15-25 per phase (30-50 total)
    function generatePath(target) {
        const path = [];
        let shadow = [];

        function noise() {
            if (shadow.length < 3) {
                const d = Math.floor(Math.random() * 10).toString();
                path.push({ type: 'enter', digit: d });
                shadow.push(d);
                path.push({ type: 'delete' });
                shadow.pop();
            }
        }

        function deleteBack(n) {
            for (let i = 0; i < n; i++) {
                path.push({ type: 'delete' });
                shadow.pop();
            }
        }

        for (let i = 0; i < 3; i++) {
            // 0-2 noise steps before correct digit
            const nb = Math.floor(Math.random() * 3);
            for (let n = 0; n < nb; n++) noise();

            // Enter correct digit
            path.push({ type: 'enter', digit: target[i] });
            shadow.push(target[i]);

            // Sometimes add 1-2 wrong digits after, then delete back
            if (Math.random() < 0.5 && shadow.length < 3) {
                const f1 = Math.floor(Math.random() * 10).toString();
                path.push({ type: 'enter', digit: f1 });
                shadow.push(f1);
                if (Math.random() < 0.4 && shadow.length < 3) {
                    const f2 = Math.floor(Math.random() * 10).toString();
                    path.push({ type: 'enter', digit: f2 });
                    shadow.push(f2);
                }
                deleteBack(shadow.length - (i + 1));
            }

            // Sometimes backtrack and re-enter
            if (Math.random() < 0.3 && i > 0) {
                const back = 1 + Math.floor(Math.random() * (i + 1));
                deleteBack(back);
                for (let j = shadow.length; j <= i; j++) {
                    if (Math.random() < 0.5) noise();
                    path.push({ type: 'enter', digit: target[j] });
                    shadow.push(target[j]);
                }
            }
        }

        // Optional noise before final digit
        if (Math.random() < 0.4) noise();

        // 4th digit — always correct, always last
        path.push({ type: 'enter', digit: target[3] });

        return path;
    }

    function startScramble() {
        document.getElementById('display-view').classList.add('hidden');
        document.getElementById('scramble-view').classList.remove('hidden');
        secretPin = Math.floor(1000 + Math.random() * 9000).toString();

        // Keep generating until total is between 30-50
        let p1, p2;
        do {
            p1 = generatePath(secretPin);
            p2 = generatePath(secretPin);
        } while ((p1.length + p2.length) < 30 || (p1.length + p2.length) > 50);

        p1Len = p1.length;
        masterSteps = [...p1, ...p2];
        index = 0;
        updateUI();
    }

    function clearHighlights() {
        ['1','2','3','4','5','6','7','8','9','0'].forEach(d => {
            const el = document.getElementById('k' + d);
            if (el) el.className = 'key' + (d === '0' ? ' key-zero' : '');
        });
        document.getElementById('kdel').className = 'key-del';
    }

    function updateUI() {
        const isPhase2 = index >= p1Len;
        const step = masterSteps[index];

        document.getElementById('dot-1').classList.toggle('active', !isPhase2);
        document.getElementById('dot-2').classList.toggle('active', isPhase2);
        document.getElementById('phase-label').textContent = isPhase2 ? 'PHASE 2 — CONFIRM' : 'PHASE 1 — ENTRY';

        clearHighlights();

        if (step.type === 'delete') {
            document.getElementById('kdel').classList.add('highlight-del');
        } else {
            document.getElementById('k' + step.digit).classList.add('highlight');
        }
    }

    async function nextStep() {
        index++;
        if (index < masterSteps.length) {
            updateUI();
        } else {
            clearHighlights();
            await db.collection("users").doc(auth.currentUser.uid).set({ pin: secretPin });
            await auth.signOut();
            location.reload();
        }
    }
</script>
