<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #00ffcc; padding: 40px; width: 400px; text-align: center; }
        .instruction { font-size: 3.5rem; font-weight: bold; margin: 40px 0; color: #ff3b30; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        input { background: #111; color: #00ffcc; border: 1px solid #333; padding: 12px; width: 90%; margin: 10px 0; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-gate" class="card">
        <h1>VAULT_SYNC</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="pw" placeholder="PASSWORD">
        <button onclick="handleAuth()">INITIALIZE</button>
    </div>

    <div id="app-container" class="card hidden">
        <div id="scramble-view">
            <div id="phase-label" style="font-size: 0.8rem; color:#00ffcc">PHASE 1</div>
            <div class="instruction" id="cmd-text">READY</div>
            <button onclick="nextStep()">NEXT_STEP</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEkrxbgNeezTdRjQSz_tcChEQMpsTa8aY",
            authDomain: "lockbox-a98b0.firebaseapp.com",
            projectId: "lockbox-a98b0",
            storageBucket: "lockbox-a98b0.firebasestorage.app",
            messagingSenderId: "484816205664",
            appId: "1:484816205664:web:3f82f72c907c23714cd005"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let secretPin = "";
        let steps = [];
        let currentIdx = 0;
        let p1Len = 0;

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                startNewScramble();
            }
        });

        function generatePath(target) {
            let tArr = target.split('');
            let shadow = [];
            let path = [];
            while (shadow.join('') !== target) {
                // FIXED: Force the 4th digit once 3 are in to prevent auto-submit errors
                if (shadow.length === 3) {
                    path.push("ENTER " + tArr[3]); shadow.push(tArr[3]);
                } else if (shadow.length === 0) {
                    let d = (Math.random() > 0.5) ? tArr[0] : Math.floor(Math.random()*10).toString();
                    path.push("ENTER " + d); shadow.push(d);
                } else {
                    let r = Math.random();
                    if (r < 0.4) { let d = tArr[shadow.length]; path.push("ENTER " + d); shadow.push(d); }
                    else if (r < 0.7) { let d = Math.floor(Math.random()*10).toString(); path.push("ENTER " + d); shadow.push(d); }
                    else { path.push("DELETE"); shadow.pop(); }
                }
            }
            return path;
        }

        function startNewScramble() {
            secretPin = Math.floor(1000 + Math.random() * 9000).toString();
            let p1 = generatePath(secretPin);
            let p2 = generatePath(secretPin);
            p1Len = p1.length;
            steps = [...p1, ...p2];
            currentIdx = 0;
            renderStep();
        }

        function renderStep() {
            document.getElementById('phase-label').innerText = currentIdx >= p1Len ? "PHASE 2: CONFIRM" : "PHASE 1: ENTRY";
            document.getElementById('cmd-text').innerText = steps[currentIdx];
        }

        async function nextStep() {
            currentIdx++;
            if (currentIdx < steps.length) {
                renderStep();
            } else {
                await db.collection("users").doc(auth.currentUser.uid).set({ pin: secretPin });
                alert("LOCKED.");
                auth.signOut().then(() => location.reload());
            }
        }
    </script>
</body>
</html>
